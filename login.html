<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login - Velora</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  font-family: Arial, sans-serif;
  color: white;
}

/* LOGIN CARD */
.container {
  width: 360px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(15px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  text-align: center;
}

/* TITLE */
h1 {
  margin-bottom: 10px;
  font-size: 28px;
  background: linear-gradient(45deg, #ff3d6e, #7c4dff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

p {
  opacity: 0.7;
  font-size: 14px;
  margin-bottom: 25px;
}

/* INPUTS */
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

input::placeholder {
  color: rgba(255,255,255,0.5);
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-weight: bold;
  background: linear-gradient(45deg, #ff3d6e, #7c4dff);
  color: white;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* LINK */
a {
  display: block;
  margin-top: 15px;
  font-size: 13px;
  color: #aaa;
  text-decoration: none;
}

a:hover {
  color: white;
}
</style>
</head>

<body>

<div class="container">
  <h1>Velora</h1>
  <p>Meet people who match your vibe</p>

  <input type="email" id="email" placeholder="Email"/>
  <input type="password" id="password" placeholder="Password"/>

  <button onclick="login()">Login</button>

  <a href="#">Don't have an account? Sign up</a>
</div>

<script>
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Please fill all fields");
    return;
  }

  // fake login (replace with backend later)
  localStorage.setItem("user", email);

  alert("Login successful!");

  // redirect to swipe page
  window.location.href = "index.html";
}
</script>

</body>
</html>
