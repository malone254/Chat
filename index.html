<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tinder Clone</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
  font-family: Arial;
  overflow: hidden;
}

/* HEADER */
.header {
  position: absolute;
  top: 20px;
  color: white;
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 3px;
}

/* DECK */
.deck {
  position: relative;
  width: 320px;
  height: 480px;
}

/* CARD */
.card {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 20px;
  overflow: hidden;
  background: white;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  cursor: grab;
  transition: transform 0.3s ease;
}

.card img {
  width: 100%;
  height: 80%;
  object-fit: cover;
}

.info {
  padding: 10px;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.age {
  color: gray;
}

/* BUTTONS */
.buttons {
  position: absolute;
  bottom: 30px;
  display: flex;
  gap: 40px;
}

.btn {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: none;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.nope {
  background: #ff4d4d;
  color: white;
}

.like {
  background: #4dff88;
  color: white;
}

/* LABELS */
.label {
  position: absolute;
  top: 20px;
  font-size: 40px;
  font-weight: 800;
  opacity: 0;
  transition: 0.2s;
}

.like-label {
  left: 20px;
  color: #4dff88;
}

.nope-label {
  right: 20px;
  color: #ff4d4d;
}
</style>
</head>

<body>

<div class="header">VELORA</div>

<div class="deck" id="deck">

  <div class="card">
    <div class="label like-label">LIKE</div>
    <div class="label nope-label">NOPE</div>

    <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1"/>
    <div class="info">
      <div class="name">Anna</div>
      <div class="age">24 • Travel lover</div>
    </div>
  </div>

  <div class="card">
    <div class="label like-label">LIKE</div>
    <div class="label nope-label">NOPE</div>

    <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e"/>
    <div class="info">
      <div class="name">Mike</div>
      <div class="age">27 • Gym & Music</div>
    </div>
  </div>

  <div class="card">
    <div class="label like-label">LIKE</div>
    <div class="label nope-label">NOPE</div>

    <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2"/>
    <div class="info">
      <div class="name">Sophie</div>
      <div class="age">22 • Artist</div>
    </div>
  </div>

</div>

<div class="buttons">
  <button class="btn nope" onclick="swipe('nope')">✖</button>
  <button class="btn like" onclick="swipe('like')">❤</button>
</div>

<script>
let cards = document.querySelectorAll(".card");
let current = cards.length - 1;

cards.forEach((card, i) => {
  card.style.zIndex = i;
});

let active = cards[current];
addDrag(active);

function addDrag(card) {
  let startX = 0;
  let moveX = 0;

  card.onmousedown = start;
  card.ontouchstart = start;

  function start(e) {
    startX = e.type.includes("touch") ? e.touches[0].clientX : e.clientX;

    document.onmousemove = move;
    document.ontouchmove = move;

    document.onmouseup = end;
    document.ontouchend = end;
  }

  function move(e) {
    moveX = e.type.includes("touch")
      ? e.touches[0].clientX - startX
      : e.clientX - startX;

    card.style.transform = `translateX(${moveX}px) rotate(${moveX * 0.05}deg)`;

    let like = card.querySelector(".like-label");
    let nope = card.querySelector(".nope-label");

    if (moveX > 50) {
      like.style.opacity = 1;
      nope.style.opacity = 0;
    } else if (moveX < -50) {
      like.style.opacity = 0;
      nope.style.opacity = 1;
    } else {
      like.style.opacity = 0;
      nope.style.opacity = 0;
    }
  }

  function end() {
    document.onmousemove = null;
    document.onmouseup = null;

    if (moveX > 120) {
      swipeAction(card, "like");
    } else if (moveX < -120) {
      swipeAction(card, "nope");
    } else {
      card.style.transform = "translateX(0)";
    }

    moveX = 0;
  }
}

function swipe(type) {
  swipeAction(active, type);
}

function swipeAction(card, type) {
  if (!card) return;

  card.style.transition = "0.5s";

  if (type === "like") {
    card.style.transform = "translateX(500px) rotate(20deg)";
  } else {
    card.style.transform = "translateX(-500px) rotate(-20deg)";
  }

  setTimeout(() => {
    card.remove();
    current--;

    if (current >= 0) {
      active = cards[current];
      addDrag(active);
    }
  }, 400);
}
</script>

</body>
</html>
