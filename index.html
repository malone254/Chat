<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tinder Style Swipe UI</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* TOP BAR */
.topbar {
  position: absolute;
  top: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
  color: white;
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 2px;
}

/* STACK AREA */
.stack {
  position: relative;
  width: 320px;
  height: 460px;
}

/* CARD */
.card {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  background: #fff;
  cursor: grab;
  transition: transform 0.3s ease;
}

.card img {
  width: 100%;
  height: 80%;
  object-fit: cover;
}

.card .info {
  padding: 10px;
  background: white;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.age {
  color: gray;
}

/* BUTTONS */
.actions {
  position: absolute;
  bottom: 30px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 40px;
}

.btn {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: none;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  transition: 0.2s;
}

.nope {
  background: #ff4d4d;
  color: white;
}

.like {
  background: #4dff88;
  color: white;
}

.btn:hover {
  transform: scale(1.1);
}

/* SWIPE LABELS */
.label {
  position: absolute;
  top: 30px;
  font-size: 40px;
  font-weight: 800;
  opacity: 0;
  transform: rotate(-20deg);
  transition: 0.2s;
}

.like-label {
  left: 20px;
  color: #4dff88;
}

.nope-label {
  right: 20px;
  color: #ff4d4d;
}
</style>
</head>

<body>

<div class="topbar">VELORA</div>

<div class="stack" id="stack">

  <div class="card">
    <div class="label like-label">LIKE</div>
    <div class="label nope-label">NOPE</div>
    <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1"/>
    <div class="info">
      <div class="name">Anna, 24</div>
      <div class="age">Travel lover • Coffee addict</div>
    </div>
  </div>

  <div class="card">
    <div class="label like-label">LIKE</div>
    <div class="label nope-label">NOPE</div>
    <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e"/>
    <div class="info">
      <div class="name">Mike, 27</div>
      <div class="age">Gym • Tech • Music</div>
    </div>
  </div>

  <div class="card">
    <div class="label like-label">LIKE</div>
    <div class="label nope-label">NOPE</div>
    <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2"/>
    <div class="info">
      <div class="name">Sophie, 22</div>
      <div class="age">Art • Fashion • Coffee</div>
    </div>
  </div>

</div>

<div class="actions">
  <button class="btn nope" onclick="swipe('nope')">✖</button>
  <button class="btn like" onclick="swipe('like')">❤</button>
</div>

<script>
const cards = document.querySelectorAll(".card");
let current = cards.length - 1;

// initialize stack
cards.forEach((card, i) => {
  card.style.zIndex = i;
});

let activeCard = cards[current];
addDrag(activeCard);

function addDrag(card) {
  let startX = 0;
  let moveX = 0;

  card.onmousedown = startDrag;
  card.ontouchstart = startDrag;

  function startDrag(e) {
    startX = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;

    document.onmousemove = onMove;
    document.ontouchmove = onMove;

    document.onmouseup = endDrag;
    document.ontouchend = endDrag;
  }

  function onMove(e) {
    moveX = e.type.includes("touch") ? e.touches[0].clientX - startX : e.clientX - startX;

    card.style.transform = `translateX(${moveX}px) rotate(${moveX * 0.05}deg)`;

    const like = card.querySelector(".like-label");
    const nope = card.querySelector(".nope-label");

    if (moveX > 50) {
      like.style.opacity = 1;
      nope.style.opacity = 0;
    } else if (moveX < -50) {
      like.style.opacity = 0;
      nope.style.opacity = 1;
    } else {
      like.style.opacity = 0;
      nope.style.opacity = 0;
    }
  }

  function endDrag() {
    document.onmousemove = null;
    document.onmouseup = null;

    if (moveX > 120) {
      swipeAction(card, "like");
    } else if (moveX < -120) {
      swipeAction(card, "nope");
    } else {
      card.style.transform = "translateX(0)";
    }

    moveX = 0;
  }
}

function swipe(type) {
  swipeAction(activeCard, type);
}

function swipeAction(card, type) {
  if (!card) return;

  card.style.transition = "0.5s";

  if (type === "like") {
    card.style.transform = "translateX(500px) rotate(20deg)";
  } else {
    card.style.transform = "translateX(-500px) rotate(-20deg)";
  }

  setTimeout(() => {
    card.remove();
    current--;

    if (current >= 0) {
      activeCard = cards[current];
      addDrag(activeCard);
    }
  }, 400);
}
</script>

</body>
</html>
